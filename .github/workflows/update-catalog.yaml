name: Update Operation Catalog

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'infra/schemas/fprtool-full.json'

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog
        run: python scripts/generate-catalog.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/operation-catalog.md
          git diff --staged --quiet || git commit -m "docs: auto-update operation catalog" && git push
