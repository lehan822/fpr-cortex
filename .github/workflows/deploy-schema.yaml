name: Deploy Schema to S3

on:
  push:
    branches: [main, release]
    paths:
      - 'infra/schemas/fprtool-full.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - stg
          - prod

jobs:
  deploy-schema:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      STG_BUCKET: bedrock-agentcore-runtime-354767975881-ap-southeast-1-a1beixhzs
      PROD_BUCKET: TBD-prod-bucket

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=stg" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (stg)
        if: steps.env.outputs.env == 'stg'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STG }}
          aws-region: ap-southeast-1

      - name: Configure AWS credentials (prod)
        if: steps.env.outputs.env == 'prod'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ap-southeast-1

      - name: Set bucket
        id: bucket
        run: |
          if [[ "${{ steps.env.outputs.env }}" == "stg" ]]; then
            echo "name=${{ env.STG_BUCKET }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.PROD_BUCKET }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload schema to S3
        run: |
          echo "Deploying to ${{ steps.env.outputs.env }} → s3://${{ steps.bucket.outputs.name }}"
          aws s3 cp infra/schemas/fprtool-full.json \
            s3://${{ steps.bucket.outputs.name }}/schemas/fprtool-full.json

      - name: Verify upload
        run: |
          aws s3 ls s3://${{ steps.bucket.outputs.name }}/schemas/fprtool-full.json
