name: Deploy Schema to S3

on:
  push:
    branches: [main, release]
    paths:
      - 'infra/config/exposed-ops.yaml'
      - 'infra/scripts/gen-schema.py'
      - 'infra/schemas/fprtool-full.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - stg
          - prod

jobs:
  deploy-schema:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      STG_BUCKET: bedrock-agentcore-runtime-354767975881-ap-southeast-1-a1beixhzs
      PROD_BUCKET: bedrock-agentcore-runtime-348767535692-ap-southeast-1-837werwc9

    steps:
      - uses: actions/checkout@v4

      - name: Checkout fprtool-backend (for CRUD schema scanning)
        uses: actions/checkout@v4
        with:
          repository: traveloka/fpr-fprtool-backend
          path: fpr-fprtool-backend
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            fpr-tools-common-impl/src/main/java
            fpr-tools-demand-impl/src/main/java
            fpr-tools-supply-impl/src/main/java
            fpc-tools-budget-impl/src/main/java
            fpc-tools-pricing-profile-impl/src/main/java
            fpc-tools-pricing-provider-impl/src/main/java

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate per-domain schemas
        run: |
          python infra/scripts/gen-schema.py \
            --backend-path fpr-fprtool-backend \
            --output-dir infra/schemas

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=stg" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials (stg)
        if: steps.env.outputs.env == 'stg'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STG }}
          aws-region: ap-southeast-1

      - name: Configure AWS credentials (prod)
        if: steps.env.outputs.env == 'prod'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ap-southeast-1

      - name: Set bucket
        id: bucket
        run: |
          if [[ "${{ steps.env.outputs.env }}" == "stg" ]]; then
            echo "name=${{ env.STG_BUCKET }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.PROD_BUCKET }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload schemas to S3
        run: |
          echo "Deploying to ${{ steps.env.outputs.env }} → s3://${{ steps.bucket.outputs.name }}/schemas/"
          for domain in pricing supply demand config; do
            if [ -f "infra/schemas/$domain/$domain.json" ]; then
              aws s3 cp "infra/schemas/$domain/$domain.json" \
                "s3://${{ steps.bucket.outputs.name }}/schemas/$domain.json"
              echo "  ✅ $domain.json uploaded"
            fi
          done
          # Keep fprtool-full.json as fallback
          if [ -f "infra/schemas/fprtool-full.json" ]; then
            aws s3 cp infra/schemas/fprtool-full.json \
              "s3://${{ steps.bucket.outputs.name }}/schemas/fprtool-full.json"
            echo "  ✅ fprtool-full.json uploaded"
          fi

      - name: Verify upload
        run: |
          aws s3 ls "s3://${{ steps.bucket.outputs.name }}/schemas/"

      - name: Post-deploy smoke test (tool existence)
        if: steps.env.outputs.env == 'stg'
        run: |
          echo "Verifying all skill tools exist in generated schemas..."
          python3 -c "
          import json, re, yaml
          from pathlib import Path

          # Load exposed-ops
          with open('infra/config/exposed-ops.yaml') as f:
              config = yaml.safe_load(f)
          registered = set()
          for ops in config.values():
              for op in ops:
                  registered.add(op['id'])

          # Load skill tools
          skill_tools = set()
          for f in Path('skills/domain').rglob('SKILL.md'):
              content = f.read_text()
              m = re.search(r'^tools:\s*\n((?:\s+-\s+.+\n)+)', content, re.MULTILINE)
              if m:
                  for t in re.findall(r'^\s+-\s+(\S+)', m.group(1), re.MULTILINE):
                      skill_tools.add(t)

          # Check all skill tools have schemas generated
          missing = []
          for domain_dir in Path('infra/schemas').iterdir():
              if domain_dir.is_dir() and (domain_dir / f'{domain_dir.name}.json').exists():
                  pass  # schema exists
          
          for tool in sorted(skill_tools):
              if tool not in registered:
                  missing.append(tool)

          if missing:
              print(f'❌ {len(missing)} skill tools not in exposed-ops: {missing}')
              exit(1)
          print(f'✅ All {len(skill_tools)} skill tools registered and schemas deployed')
          "
