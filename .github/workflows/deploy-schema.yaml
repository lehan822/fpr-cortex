name: Deploy Schema to S3

on:
  push:
    branches: [main]
    paths:
      - 'infra/schemas/fprtool-full.json'
  workflow_dispatch:

jobs:
  deploy-schema:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Upload schema to S3
        run: |
          aws s3 cp infra/schemas/fprtool-full.json \
            s3://bedrock-agentcore-runtime-354767975881-ap-southeast-1-a1beixhzs/schemas/fprtool-full.json

      - name: Verify upload
        run: |
          aws s3 ls s3://bedrock-agentcore-runtime-354767975881-ap-southeast-1-a1beixhzs/schemas/fprtool-full.json
