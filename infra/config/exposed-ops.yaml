# FPR Cortex — Exposed Operations Config
# Source of truth for which fprtool-backend APIs are exposed via MCP Gateway.
#
# Usage:
#   python infra/scripts/gen-schema.py
#
# Path formats:
#   - "api/path"                        → Standard API (prefix /api/v2/ auto-added)
#   - "crud/getEntryList(entityType)"   → CRUD framework list op (script scans backend for filters/sort)
#   - "crud/getEntryDetail(entityType)" → CRUD framework detail op
#
# Adding a new op: add entry here → run gen-schema → CI pushes to S3 → Gateway picks up.

